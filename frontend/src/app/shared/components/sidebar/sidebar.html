<div class="sidebar">
  <div class="logo">
    <div class="logo-icon">📊</div>
    <h2>DataPulse</h2>
  </div>

  <div class="menu-section">
    <p class="section-title">MAIN MENU</p>
    <ul>
      @for (item of menuItems; track item.label) {
        <li>
          <a [routerLink]="item.path" routerLinkActive="active" style="display: flex; align-items: center; width: 100%;">
            <span class="icon">{{ item.icon }}</span>
            <span class="label">{{ item.label }}</span>
            @if (item.badge) {
              <span class="badge" style="background:#5744cb; color:white; font-size:10px; font-weight:700; padding:2px 8px; border-radius:12px; margin-left:auto;">{{ item.badge }}</span>
            }
          </a>
        </li>
      }
    </ul>
  </div>

  <div class="menu-section">
    <p class="section-title">MANAGEMENT</p>
    <ul>
      @for (item of managementItems; track item.label) {
        <li>
          <a [routerLink]="item.path" routerLinkActive="active">
            <span class="icon">{{ item.icon }}</span>
            <span class="label">{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>
  </div>

  <div class="sidebar-footer">
    <button class="logout-btn" (click)="logout()">
      <span class="icon">🚪</span>
      <span class="label">Logout</span>
    </button>
  </div>
</div>
